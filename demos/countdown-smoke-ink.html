<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke / Ink in Water Countdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            overflow: hidden;
            font-family: 'Archivo Black', sans-serif;
            isolation: isolate;
        }

        canvas#smoke-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #countdown-container {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #countdown-number {
            font-size: clamp(8rem, 30vw, 35rem);
            line-height: 1;
            color: white;
            mix-blend-mode: difference;
            user-select: none;
            pointer-events: none;
        }

        .smoke-reveal {
            animation: smokeIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .smoke-hide {
            animation: smokeOut 0.35s ease-in forwards;
        }

        @keyframes smokeIn {
            0% {
                transform: scale(0.6);
                opacity: 0;
                filter: blur(40px);
            }

            40% {
                filter: blur(12px);
                opacity: 0.6;
            }

            70% {
                transform: scale(1.05);
                filter: blur(3px);
                opacity: 0.9;
            }

            100% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0px);
            }
        }

        @keyframes smokeOut {
            0% {
                transform: scale(1);
                opacity: 1;
                filter: blur(0px);
            }

            50% {
                transform: scale(1.1);
                filter: blur(10px);
            }

            100% {
                transform: scale(1.3);
                opacity: 0;
                filter: blur(30px);
            }
        }

        /* Shockwave ring on each beat */
        .shockwave {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            margin-left: -30px;
            margin-top: -30px;
            border-radius: 50%;
            border: 2px solid rgba(242, 126, 82, 0.6);
            animation: shockwaveExpand 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 8;
        }

        .shockwave-2 {
            border-color: rgba(153, 194, 232, 0.4);
            animation-delay: 0.1s;
        }

        @keyframes shockwaveExpand {
            0% {
                transform: scale(0);
                opacity: 1;
            }

            60% {
                opacity: 0.4;
            }

            100% {
                transform: scale(35);
                opacity: 0;
            }
        }

        /* Subtle screen flash on beat */
        .beat-flash {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(242, 126, 82, 0.15), transparent 60%);
            z-index: 6;
            pointer-events: none;
            animation: beatFlash 0.6s ease-out forwards;
        }

        @keyframes beatFlash {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* Floating embers */
        .ember {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(242, 126, 82, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 7;
            box-shadow: 0 0 6px rgba(242, 126, 82, 0.6);
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 25%, rgba(0, 0, 0, 0.75) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* Subtle scan lines overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            opacity: 0.04;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.1) 2px,
                    rgba(255, 255, 255, 0.1) 4px);
        }

        /* Bottom text hint */
        #bottom-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            font-family: 'Inter', 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
            animation: hintPulse 2s ease-in-out infinite;
        }

        @keyframes hintPulse {

            0%,
            100% {
                opacity: 0.15;
            }

            50% {
                opacity: 0.35;
            }
        }
    </style>
</head>

<body>
    <canvas id="smoke-canvas"></canvas>
    <div class="vignette"></div>
    <div class="scanlines"></div>

    <div id="countdown-container">
        <div id="countdown-number" class="smoke-reveal">10</div>
    </div>

    <div id="bottom-hint">SHESHINES AWAITS</div>

    <script>
        // ===== SMOKE / INK IN WATER SIMULATION =====
        const canvas = document.getElementById('smoke-canvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Color palettes for different life stages
        const colorSets = [
            { r: 242, g: 126, b: 82 },   // brand orange
            { r: 153, g: 194, b: 232 },   // brand light blue
            { r: 15, g: 68, b: 117 },     // brand dark blue
            { r: 200, g: 170, b: 220 },   // soft purple
            { r: 255, g: 200, b: 150 },   // warm peach
            { r: 100, g: 180, b: 255 },   // sky blue
        ];

        const particles = [];
        const MAX_PARTICLES = 400;
        const embers = [];

        class SmokeParticle {
            constructor(x, y, burst = false, intensity = 1) {
                this.x = x || W / 2 + (Math.random() - 0.5) * W * 0.4;
                this.y = y || H / 2 + (Math.random() - 0.5) * H * 0.4;
                const angle = Math.random() * Math.PI * 2;
                const speed = burst ? (2 + Math.random() * 8) * intensity : (0.2 + Math.random() * 1);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = burst ? (0.005 + Math.random() * 0.01) : (0.002 + Math.random() * 0.005);
                this.size = burst ? (20 + Math.random() * 50) * intensity : (30 + Math.random() * 70);
                this.maxSize = this.size * 3;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.015;
                const c = colorSets[Math.floor(Math.random() * colorSets.length)];
                this.r = c.r + Math.floor((Math.random() - 0.5) * 30);
                this.g = c.g + Math.floor((Math.random() - 0.5) * 30);
                this.b = c.b + Math.floor((Math.random() - 0.5) * 30);
                this.turbulenceX = Math.random() * 1000;
                this.turbulenceY = Math.random() * 1000;
                this.turbulenceScale = 0.5 + Math.random() * 1;
            }

            update(time) {
                // Organic turbulence
                const tx = Math.sin(time * 0.0008 + this.turbulenceX) * this.turbulenceScale;
                const ty = Math.cos(time * 0.0006 + this.turbulenceY) * this.turbulenceScale;

                this.vx += tx * 0.03;
                this.vy += ty * 0.03 - 0.015; // subtle upward drift

                // Damping
                this.vx *= 0.985;
                this.vy *= 0.985;

                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;
                this.life -= this.decay;

                // Grow then shrink
                if (this.life > 0.6) {
                    this.size = Math.min(this.size + 0.8, this.maxSize);
                } else {
                    this.size += 0.2;
                }
            }

            draw() {
                if (this.life <= 0) return;

                // Opacity curve — fade in, hold, fade out
                let alpha;
                if (this.life > 0.85) {
                    alpha = (1 - this.life) / 0.15 * 0.15; // fade in
                } else {
                    alpha = this.life * 0.15; // fade out
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Multi-layered gradient for depth
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                grad.addColorStop(0, `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 1.2})`);
                grad.addColorStop(0.3, `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.7})`);
                grad.addColorStop(0.7, `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.25})`);
                grad.addColorStop(1, `rgba(${this.r}, ${this.g}, ${this.b}, 0)`);

                ctx.fillStyle = grad;
                ctx.beginPath();
                // Irregular organic shape
                const squash = 0.6 + Math.sin(this.rotation * 2) * 0.15;
                ctx.ellipse(0, 0, this.size, this.size * squash, this.rotation * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // Floating ember class
        class Ember {
            constructor() {
                this.x = W / 2 + (Math.random() - 0.5) * W * 0.6;
                this.y = H * 0.8 + Math.random() * H * 0.2;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -(0.5 + Math.random() * 1.5);
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = 1 + Math.random() * 2;
                const isOrange = Math.random() > 0.4;
                this.r = isOrange ? 242 : 153;
                this.g = isOrange ? 126 : 194;
                this.b = isOrange ? 82 : 232;
            }

            update(time) {
                this.x += this.vx + Math.sin(time * 0.003 + this.x * 0.01) * 0.3;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;
                const alpha = this.life * 0.8;
                ctx.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha})`;
                ctx.shadowColor = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.5})`;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Spawn ambient smoke
        function spawnAmbient() {
            if (particles.length < MAX_PARTICLES) {
                const spawnX = W / 2 + (Math.random() - 0.5) * W * 0.6;
                const spawnY = H / 2 + (Math.random() - 0.5) * H * 0.5;
                particles.push(new SmokeParticle(spawnX, spawnY));
            }
            // Spawn embers
            if (embers.length < 30 && Math.random() < 0.1) {
                embers.push(new Ember());
            }
        }

        // Burst on beat
        function burstParticles(intensity = 1) {
            const burstCount = Math.floor(30 * intensity);
            for (let i = 0; i < burstCount; i++) {
                const angle = (i / burstCount) * Math.PI * 2 + Math.random() * 0.3;
                const dist = 20 + Math.random() * 40;
                const bx = W / 2 + Math.cos(angle) * dist;
                const by = H / 2 + Math.sin(angle) * dist;
                particles.push(new SmokeParticle(bx, by, true, intensity));
            }
            // Spawn extra embers on burst
            for (let i = 0; i < 8; i++) {
                embers.push(new Ember());
            }
        }

        // Create shockwave DOM element
        function createShockwave() {
            const wave1 = document.createElement('div');
            wave1.className = 'shockwave';
            document.body.appendChild(wave1);
            setTimeout(() => wave1.remove(), 1200);

            const wave2 = document.createElement('div');
            wave2.className = 'shockwave shockwave-2';
            document.body.appendChild(wave2);
            setTimeout(() => wave2.remove(), 1300);

            // Beat flash
            const flash = document.createElement('div');
            flash.className = 'beat-flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 600);
        }

        let time = 0;
        let screenShake = 0;

        function animate() {
            // Trail fade — creates the ink-in-water persistence
            ctx.fillStyle = 'rgba(5, 5, 5, 0.04)';
            ctx.fillRect(0, 0, W, H);

            // Apply screen shake
            if (screenShake > 0.5) {
                ctx.save();
                ctx.translate(
                    (Math.random() - 0.5) * screenShake,
                    (Math.random() - 0.5) * screenShake
                );
                screenShake *= 0.9;
            }

            // Spawn ambient
            if (Math.random() < 0.35) spawnAmbient();

            // Update & draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(time);
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Update & draw embers
            for (let i = embers.length - 1; i >= 0; i--) {
                embers[i].update(time);
                embers[i].draw();
                if (embers[i].life <= 0) embers.splice(i, 1);
            }

            if (screenShake > 0.5) ctx.restore();

            time++;
            requestAnimationFrame(animate);
        }
        animate();

        // ===== COUNTDOWN =====
        const numberEl = document.getElementById('countdown-number');
        let count = 10;

        function triggerBeat(intensity = 1) {
            burstParticles(intensity);
            createShockwave();
            screenShake = 6 * intensity;
        }

        function nextCount() {
            count--;
            if (count > 0) {
                numberEl.classList.remove('smoke-reveal');
                numberEl.classList.add('smoke-hide');

                // Increase intensity as we approach zero
                const intensity = 1 + (10 - count) * 0.15;
                setTimeout(() => {
                    numberEl.textContent = count;
                    numberEl.classList.remove('smoke-hide');
                    numberEl.classList.add('smoke-reveal');
                    triggerBeat(intensity);
                }, 350);
            } else {
                numberEl.classList.remove('smoke-reveal');
                numberEl.classList.add('smoke-hide');
                setTimeout(() => {
                    numberEl.textContent = 'GO';
                    numberEl.style.fontSize = 'clamp(5rem, 20vw, 25rem)';
                    numberEl.classList.remove('smoke-hide');
                    numberEl.classList.add('smoke-reveal');
                    triggerBeat(3);
                }, 350);
            }
        }

        // Initial burst
        triggerBeat(0.5);
        setInterval(nextCount, 1000);
    </script>
</body>

</html>
